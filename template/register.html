<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Febz Couture | Register</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #000;
    color: #fff;
    font-family: 'Inter', sans-serif;
    height: 100vh;
}

/* ===== CENTER REGISTER ===== */
.register-wrapper {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* ===== REGISTER BOX ===== */
.register-box {
    width: 460px;
    padding: 65px 55px;
    border: 1px solid rgba(255,255,255,0.15);
    text-align: center;
}

/* ===== BRAND ===== */
.register-box h1 {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    letter-spacing: 4px;
    margin-bottom: 8px;
}

.register-box p {
    font-size: 12px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.6);
    margin-bottom: 50px;
}

/* ===== INPUTS ===== */
.field {
    margin-bottom: 32px;
    text-align: left;
}

.field label {
    display: block;
    font-size: 11px;
    letter-spacing: 2px;
    margin-bottom: 8px;
    color: rgba(255,255,255,0.6);
}

.field input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(255,255,255,0.3);
    padding: 12px 0;
    color: #fff;
    font-size: 14px;
    outline: none;
}

.field input:focus {
    border-bottom-color: #fff;
}

/* ===== BUTTON ===== */
.register-box button {
    margin-top: 30px;
    width: 100%;
    padding: 15px;
    background: transparent;
    border: 1px solid #fff;
    color: #fff;
    font-size: 12px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: 0.4s;
}

.register-box button:hover {
    background: #fff;
    color: #000;
}

/* ===== FOOTER ===== */
.register-footer {
    margin-top: 40px;
    font-size: 12px;
    color: rgba(255,255,255,0.5);
}

.register-footer a {
    color: #fff;
    text-decoration: none;
    border-bottom: 1px solid rgba(255,255,255,0.4);
}
/* ===== ERROR MESSAGE ===== */
.error-message {
    margin-top: 22px;
    padding: 12px;
    border: 1px solid rgba(255, 80, 80, 0.6);
    color: #ff6b6b;
    font-size: 11px;
    letter-spacing: 2px;
    text-align: center;
    animation: fadeSlide 0.4s ease;
}

/* subtle couture animation */
@keyframes fadeSlide {
    from {
        opacity: 0;
        transform: translateY(-6px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

</style>
</head>

<body>

<div class="register-wrapper">
    <div class="register-box">
        <h1>FEBZ COUTURE</h1>
        <p>CREATE YOUR COUTURE ACCOUNT</p>

        <form method="POST">
            {% csrf_token %}

            <div class="field">
                <label>USERNAME</label>
                <input type="text" name="username" required>
            </div>

            <div class="field">
                <label>EMAIL</label>
                <input type="email" name="email" required>
            </div>

            <div class="field">
                <label>PASSWORD</label>
                <input type="password" name="password" required>
            </div>

            <button type="submit">REGISTER</button>
            {% if error %}
    <div class="error-message">
        {{ error }}
    </div>
{% endif %}
        </form>

        <div class="register-footer">
            Already a member?
            <a href="login">Login</a>
        </div>
    </div>
</div>

</body>
</html>
