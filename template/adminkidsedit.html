{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Kids Product</title>

<style>
body{
    background:#000;
    color:#fff;
    font-family:Arial;
    padding:40px;
}

.form-box{
    max-width:500px;
    margin:auto;
    background:#111;
    padding:30px;
    border:1px solid rgba(255,255,255,0.1);
}

input, textarea{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
}

button{
    padding:10px 20px;
    background:#ffd7a0;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="form-box">
<h2>Edit Kids Product</h2>

<form method="POST" enctype="multipart/form-data">
{% csrf_token %}

<label>Name</label>
<input type="text" name="productname" value="{{ d.kidsname }}">

<label>Price</label>
<input type="number" name="productprice" value="{{ d.kidsprice }}">

<label>Description</label>
<textarea name="productdescription">{{ d.kidsdescription }}</textarea>

<label>Current Image</label><br>
<img src="{{ d.kidsimage.url }}" width="120"><br><br>

<label>Change Image</label>
<input type="file" name="productimage">

<button type="submit">Update</button>

</form>
</div>

</body>
</html>
